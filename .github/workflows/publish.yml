name: Deploy Pumping Python

on:
  push:
    branches: ["main"]
    paths:
      - 'source/**'
      - '.github/workflows/publish.yml'
      - 'pyproject.toml'
      - 'uv.lock'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  # Build job: produce the site (or reuse a previous identical build).
  # We only run Sphinx when the input tree actually changed (see paths: filter + html cache).
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 1

      - name: install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.13"
          enable-cache: true

      - name: install dependencies
        run: uv sync --frozen --no-dev --no-install-project --extra docs

      # "Only rebuild what we must": if this exact source tree was already built and cached,
      # restore the final HTML and skip the expensive sphinx-build entirely.
      # Key must incorporate everything that affects rendered output.
      - name: restore site html cache
        id: site-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: build/html
          key: site-html-${{ hashFiles('source/**', 'pyproject.toml', 'uv.lock', 'source/conf.py') }}
          restore-keys: |
            site-html-

      - name: build sphinx documentation
        if: steps.site-cache.outputs.cache-hit != 'true'
        run: |
          rm -rf build
          uv run sphinx-build -d build/doctrees -j auto ./source ./build/html
          # Make sure the custom domain file is in the published root.
          cp -f CNAME build/html/CNAME 2>/dev/null || true

      - name: upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: './build/html'

  # Deploy job: the only job that touches the live github-pages environment.
  # This is the official recommended split (build produces artifact, deploy consumes it).
  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: deploy to github_pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

      # Fast, cheap smoke test after the deploy step has already published.
      # Does not delay time-to-live. Helps surface "it said success but the bytes are wrong"
      # so the author can react the moment a bad deploy happens.
      - name: verify live site
        run: |
          curl -fsSL --retry 8 --retry-delay 2 --max-time 90 \
            https://www.pumpingpython.com/ \
            | grep -q "pumping python" || {
              echo "ERROR: live site did not contain expected content after deploy"
              exit 1
            }
          echo "Live site verified."