name: Deploy Pumping Python

on:
  push:
    branches: ["main"]
    paths:
      - 'source/**'
      - '.github/workflows/publish.yml'
      - 'pyproject.toml'
      - 'uv.lock'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: install uv
        uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.13"
          enable-cache: true

      - name: install dependencies
        run: uv sync --frozen --no-dev --no-install-project --extra docs

      - name: cache sphinx doctrees
        uses: actions/cache@v5
        with:
          path: build/doctrees
          key: ${{ runner.os }}-sphinx-doctrees-v1-${{ hashFiles('source/conf.py', 'uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-sphinx-doctrees-v1-

      - name: build sphinx documentation
        run: |
          uv run sphinx-build -d build/doctrees -j auto ./source ./build/html
          find build/html -name '.buildinfo' -delete
          find build/html -name 'objects.inv' -delete

      - name: setup github_pages
        uses: actions/configure-pages@v6

      - name: upload
        uses: actions/upload-pages-artifact@v5
        with:
          path: './build/html'

      - name: deploy to github_pages
        id: deployment
        uses: actions/deploy-pages@v5