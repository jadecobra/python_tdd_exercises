name: Deploy Pumping Python

on:
  push:
    branches: ["main"]
    paths:
      - 'source/**'
      - '.github/workflows/publish.yml'
      - 'pyproject.toml'
      - 'uv.lock'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.13"
          enable-cache: true

      - name: install dependencies
        run: uv sync --frozen --no-dev --no-install-project --extra docs

      - name: cache sphinx doctrees
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: build/doctrees
          key: ${{ runner.os }}-sphinx-doctrees-v3-${{ hashFiles('source/conf.py', 'uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-sphinx-doctrees-v3-

      - name: invalidate changed doctrees for incremental sphinx
        run: |
          mkdir -p build/doctrees
          rm -f build/doctrees/.source-mtimes.tsv

          invalidate_rst() {
            local f="$1"
            local doc="${f#source/}"
            doc="${doc%.rst}"
            rm -f "build/doctrees/${doc}.doctree"
          }

          if [ "${{ github.event_name }}" = "push" ] && \
             [ -n "${{ github.event.before }}" ] && \
             [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            mapfile -t changed < <(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" -- source)
            if [ "${#changed[@]}" -gt 40 ]; then
              find build/doctrees -mindepth 1 -delete
            else
              for f in "${changed[@]}"; do
                [ -f "$f" ] || continue
                case "$f" in
                  source/links.rst)
                    find build/doctrees -mindepth 1 -delete
                    break
                    ;;
                  source/code/*)
                    find build/doctrees/code -name '*.doctree' -delete 2>/dev/null || true
                    ;;
                  *.rst)
                    invalidate_rst "$f"
                    ;;
                esac
              done
            fi
          else
            find build/doctrees -mindepth 1 -delete
          fi

      - name: build sphinx documentation
        run: |
          uv run sphinx-build -d build/doctrees -j auto ./source ./build/html
          find build/html -name '.buildinfo' -delete
          find build/html -name 'objects.inv' -delete

      - name: setup github_pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: upload
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: './build/html'

      - name: deploy to github_pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0